<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vita — новая цель</title>
<link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
<header>
  <a class="logo" href="/">⠿ vita</a>
  <span class="tag">твоя жизнь в точках</span>
</header>

<main>
  <div class="field">
    <span class="goal-title" style="text-transform:none;letter-spacing:-.5px">Новая цель</span>
  </div>
  <p class="hint" style="margin-top:-8px">Отмечай каждый день — и не разрывай цепочку. В конце заберёшь награду.</p>

  <div class="field">
    <label for="title">Цель</label>
    <input id="title" maxlength="80" placeholder="Например: 100 дней без сахара" autocomplete="off">
  </div>

  <div class="field">
    <label>Сколько дней</label>
    <div class="seg wide" id="days">
      <button data-v="21">21</button>
      <button data-v="30" class="on">30</button>
      <button data-v="66">66</button>
      <button data-v="100">100</button>
    </div>
  </div>

  <div class="field">
    <label for="reward">🎁 Награда себе за прохождение</label>
    <input id="reward" maxlength="200" placeholder="Например: новые кроссовки" autocomplete="off">
  </div>

  <div class="field">
    <label>Цвет точек</label>
    <div class="swatches" id="colors"></div>
  </div>

  <button class="primary" id="go">Создать цель</button>
  <p class="err" id="err"></p>
  <p class="page-foot" style="text-align:center">⠿ vita — обои «жизнь в точках»</p>
</main>

<script>
const COLORS = ['#34c759','#3da9fc','#ff9500','#a78bfa','#ff6b81','#ff5fa2','#f2f2f2'];
const state = { days: 30, color: '#34c759' };
const $ = id => document.getElementById(id);

const daysSeg = $('days');
daysSeg.addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  daysSeg.querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
  state.days = +b.dataset.v;
});

const colorsEl = $('colors');
COLORS.forEach((c, i) => {
  const b = document.createElement('button');
  b.className = 'swatch' + (i === 0 ? ' on' : '');
  b.style.background = c; b.dataset.v = c;
  colorsEl.appendChild(b);
});
colorsEl.addEventListener('click', e => {
  const b = e.target.closest('.swatch'); if (!b) return;
  colorsEl.querySelectorAll('.swatch').forEach(x => x.classList.toggle('on', x === b));
  state.color = b.dataset.v;
});

const go = $('go'), err = $('err');
go.addEventListener('click', async () => {
  const title = $('title').value.trim();
  if (title.length < 2) { err.textContent = 'Назови цель'; return; }
  go.disabled = true; err.textContent = '';
  try {
    const r = await fetch('/api/goal', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, days: state.days, color: state.color, reward: $('reward').value.trim() })
    });
    const j = await r.json();
    if (!r.ok) { err.textContent = j.detail || 'Что-то пошло не так'; go.disabled = false; return; }
    location.href = j.url;
  } catch {
    err.textContent = 'Нет связи с сервером — попробуй ещё раз'; go.disabled = false;
  }
});
</script>
</body>
</html>

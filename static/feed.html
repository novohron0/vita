<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <link rel="apple-touch-icon" href="/static/img/apple-touch.png">
<title>Vita — лента челленджей</title>
<script src="/static/theme.js?v=2"></script>
<link rel="stylesheet" href="/static/style.css?v=25">
</head>
<body>
<header>
  <a class="logo" href="/">⠿ vita</a>
  <nav class="nav">
    <a href="/">Обои</a>
    <a href="/goals">Цели</a>
    <a href="/feed" class="on">Лента</a>
    <a href="/me">Моя Vita</a>
    <a href="/focus">Фокус</a>
  </nav>
</header>

<main>
  <div class="field">
    <span class="goal-title" style="text-transform:none;letter-spacing:-.5px">Лента челленджей 🔥</span>
  </div>
  <p class="feed-intro">Цели, которые уже подхватили другие. Выбери свою — присоединяйся и веди прогресс, не разрывая цепочку.</p>

  <div class="showcase-list" id="posts"></div>
  <div id="top"></div>
  <div class="feed-list" id="list"><p class="page-foot">Загружаю ленту…</p></div>

  <a class="primary" href="/goals" style="display:block;text-align:center;text-decoration:none;margin-top:18px">Создать свою цель →</a>
  <p class="page-foot" style="text-align:center">⠿ vita — обои «жизнь в точках»</p>
</main>

<script>
const list = document.getElementById('list');
const topEl = document.getElementById('top');
const postsEl = document.getElementById('posts');
const esc = s => { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; };
const safeCode = value => /^[a-z0-9]+$/i.test(String(value || '')) ? String(value) : '';
const safeColor = value => /^#[0-9a-f]{6}$/i.test(String(value || '')) ? String(value) : '#a855f7';
const cleanHandle = value => String(value || '').trim().replace(/^@+/, '');
const safeMediaUrl = value => {
  try {
    const url = new URL(String(value || ''), location.origin);
    return url.origin === location.origin || url.protocol === 'https:' ? url.href : '';
  } catch { return ''; }
};
const safeTarget = value => {
  try {
    const url = new URL(String(value || ''), location.origin);
    return url.origin === location.origin && /^\/(c|s)\/[a-z0-9]+$/i.test(url.pathname) ? url.pathname : '#';
  } catch { return '#'; }
};
const plural = (n, one, few, many) => {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return few;
  return many;
};

function dots(color, base) {
  color = safeColor(color);
  const cells = [];
  for (let i = 0; i < 6; i++) {
    const on = i < 4;
    const style = on
      ? `background:${color};--dd:${base + i * 55}ms`
      : `background:rgba(255,255,255,.12)`;
    cells.push(`<span class="${on ? 'on' : ''}" style="${style}"></span>`);
  }
  return `<div class="fc-dots">${cells.join('')}</div>`;
}

function meta(it) {
  const days = Math.max(0, Number(it.days) || 0);
  const peers = Math.max(0, Number(it.peers) || 0);
  const completed = Math.max(0, Number(it.completed) || 0);
  const dayW = plural(days, 'день', 'дня', 'дней');
  const peerW = plural(peers, 'делает', 'делают', 'делают');
  const doneW = plural(completed, 'закрыл', 'закрыли', 'закрыли');
  let s = `${days} ${dayW} · <span class="fc-peers">🔥 ${peers} ${peerW}</span>`;
  if (completed > 0) s += ` · <span class="fc-done">✓ ${completed} ${doneW}</span>`;
  return s;
}

function card(it, idx, opts = {}) {
  const base = idx * 70;
  const rank = opts.rank ? `<span class="fc-rank">${opts.rank}</span>` : '';
  const cls = opts.top ? 'fc fc-top' : 'fc';
  return `<a class="${cls}" style="--i:${base}ms" href="/c/${encodeURIComponent(safeCode(it.code))}">
    ${rank || dots(it.color, base + 180)}
    <div class="fc-body">
      <div class="fc-title">${esc(it.title)}</div>
      <div class="fc-meta">${meta(it)}</div>
    </div>
    <span class="fc-go">›</span>
  </a>`;
}

function authorRow(author) {
  if (!author || typeof author !== 'object') return '';
  const handle = cleanHandle(author.handle);
  const publicHandle = /^[a-z0-9_]{3,24}$/i.test(handle) ? handle : '';
  const name = String(author.name || (publicHandle ? `@${publicHandle}` : 'Участник Vita'));
  const avatar = safeMediaUrl(author.avatar);
  const initial = (name || publicHandle || 'V').trim().charAt(0).toUpperCase() || 'V';
  const tags = Array.isArray(author.tags) ? author.tags.slice(0, 3) : [];
  const tagHtml = tags.map(value => {
    const tag = typeof value === 'string' ? { name: value } : (value || {});
    const rarity = ['common', 'rare', 'epic', 'legendary'].includes(tag.rarity) ? tag.rarity : 'common';
    return `<span class="author-tag rarity-${rarity}">${esc(tag.icon || tag.glyph || '◆')} ${esc(tag.name || tag.title || tag.id || 'Тег')}</span>`;
  }).join('');
  const body = `<span class="profile-avatar profile-avatar-small">${avatar ? `<img src="${esc(avatar)}" alt="">` : `<b aria-hidden="true">${esc(initial)}</b>`}</span>
    <span class="showcase-author-copy"><b>${esc(name)}</b>${publicHandle ? `<small>@${esc(publicHandle)}</small>` : ''}</span>
    ${tagHtml ? `<span class="author-tags">${tagHtml}</span>` : ''}`;
  return publicHandle
    ? `<a class="showcase-author" href="/u/${encodeURIComponent(publicHandle)}">${body}</a>`
    : `<div class="showcase-author">${body}</div>`;
}

function postCard(post) {
  const kinds = { goal: 'Цель', wallpaper: 'Обои', widget: 'Виджет цели' };
  const postCode = safeCode(post.code), sourceCode = safeCode(post.sourceCode);
  const imageUrl = safeMediaUrl(post.image);
  const image = imageUrl ? `<img src="${esc(imageUrl)}" alt="${esc(post.title || 'Публикация Vita')}" loading="lazy">` : '';
  const description = post.description ? `<p>${esc(post.description)}</p>` : '';
  return `<article class="showcase-card" id="post-${esc(postCode)}">
    ${image}<div class="showcase-body">
      ${authorRow(post.author)}
      <span class="showcase-kind">${kinds[post.kind] || 'Vita'} · код ${esc(sourceCode)}</span>
      <h2>${esc(post.title)}</h2>${description}
      <div class="showcase-actions">
        <a class="btn primary" href="${safeTarget(post.target)}">Открыть</a>
        <button class="btn secondary copy-vita-code" data-code="${esc(sourceCode)}">Скопировать код</button>
      </div>
    </div>
  </article>`;
}

(async () => {
  try {
    const r = await fetch('/api/feed');
    if (!r.ok) throw new Error('Не удалось загрузить ленту');
    const j = await r.json();
    const posts = Array.isArray(j.posts) ? j.posts : [];
    postsEl.innerHTML = posts.length
      ? `<div class="feed-top-h">Люди в Vita</div>${posts.map(postCard).join('')}`
      : '';
    postsEl.querySelectorAll('.copy-vita-code').forEach(button => button.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(button.dataset.code); }
      catch { window.prompt('Скопируй код', button.dataset.code); }
      button.textContent = '✓ Код скопирован';
      setTimeout(() => { button.textContent = 'Скопировать код'; }, 1400);
    }));
    const items = Array.isArray(j.items) ? j.items : [];
    if (!items.length) {
      topEl.innerHTML = '';
      list.innerHTML = posts.length ? '' : `<div class="feed-empty">
        <div class="fe-dots">${Array.from({length:6},(_,i)=>`<span style="--n:${i}"></span>`).join('')}</div>
        Пока лента пуста — <b>стань первым</b>.<br>
        Создай цель и поделись ссылкой: как только кто-то подхватит её, она появится здесь.</div>`;
      return;
    }
    const topItems = Array.isArray(j.top) ? j.top : items.slice(0, 3);
    const top = topItems.filter((it, i, a) => a.findIndex(x => x.code === it.code) === i);
    if (top.length >= 2) {
      topEl.innerHTML = `<div class="feed-top-h">Топ недели</div><div class="feed-top">${
        top.map((it, i) => card(it, i, { top: true, rank: i + 1 })).join('')
      }</div>`;
    } else {
      topEl.innerHTML = '';
    }
    const rest = items.filter(it => !top.some(t => t.code === it.code));
    list.innerHTML = rest.length
      ? rest.map((it, i) => card(it, i + top.length)).join('')
      : '';
  } catch {
    postsEl.innerHTML = '';
    topEl.innerHTML = '';
    list.innerHTML = '<p class="err">Нет связи с сервером — обнови страницу</p>';
  }
})();
</script>
</body>
</html>

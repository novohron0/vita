<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vita — цель</title>
<link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
<header>
  <a class="logo" href="/">⠿ vita</a>
  <nav class="nav">
    <a href="/">Обои</a>
    <a href="/goals" class="on">Цели</a>
    <a href="/feed">Лента</a>
    <a href="/focus">Фокус</a>
  </nav>
</header>

<main id="app"><p class="page-foot">Загружаю цель…</p></main>

<script>
const CODE = "{{CODE}}";
const SHORTCUT = "{{SHORTCUT_URL}}";
const app = document.getElementById('app');
let G = null, done = new Set();

const parseLocal = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const isoLocal = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const today = () => { const t = new Date(); t.setHours(0,0,0,0); return t; };

function bestStreak() {
  const start = parseLocal(G.start);
  let best = 0, run = 0;
  for (let i = 0; i < G.days; i++) {
    if (done.has(isoLocal(addDays(start, i)))) { run++; best = Math.max(best, run); } else run = 0;
  }
  return best;
}
function currentStreak() {
  const t = today();
  let cur = done.has(isoLocal(t)) ? t : addDays(t, -1);
  let n = 0;
  while (done.has(isoLocal(cur))) { n++; cur = addDays(cur, -1); }
  return n;
}

async function toggle(key) {
  try {
    const r = await fetch(`/api/goal/${CODE}/toggle`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ day: key })
    });
    if (!r.ok) return;
    const j = await r.json();
    if (j.done) done.add(key); else done.delete(key);
    render();
  } catch {}
}

function render() {
  const start = parseLocal(G.start), t = today();
  const doneCount = done.size;
  const pct = Math.round(doneCount / G.days * 100);
  const finished = doneCount >= G.days;
  const cols = G.days <= 42 ? 6 : G.days <= 120 ? 10 : 14;

  const cells = [];
  for (let i = 0; i < G.days; i++) {
    const d = addDays(start, i), key = isoLocal(d);
    const isDone = done.has(key);
    const isFuture = d > t;
    const isToday = key === isoLocal(t);
    const bg = isDone ? G.color : 'rgba(255,255,255,.09)';
    const ring = isToday && !isDone ? `box-shadow:inset 0 0 0 2px ${G.color};` : '';
    cells.push(
      `<button class="gt-cell" data-shape="${G.shape}" ${isFuture ? 'disabled' : ''} data-key="${key}" title="День ${i+1} · ${key}">` +
      `<span class="gt-dot" style="background:${bg};${ring}"></span></button>`
    );
  }

  app.innerHTML = `
    <div class="field" style="gap:4px">
      <span class="goal-title" style="text-transform:none">${escapeHtml(G.title)}</span>
      <span class="goal-reward">${G.reward ? '🎁 Награда за цель: <b>' + escapeHtml(G.reward) + '</b>' : ''}</span>
      ${G.peers >= 2 ? `<span style="color:#ff9f45;font-size:13px;font-weight:600;text-transform:none">🔥 ${G.peers} уже с этой целью</span>` : ''}
    </div>
    <div class="stats">
      <div><b>${doneCount}<span style="font-size:.5em;color:#6e6e73">/${G.days}</span></b><span>выполнено</span></div>
      <div><b>${currentStreak()}🔥</b><span>стрик</span></div>
      <div><b>${bestStreak()}</b><span>рекорд</span></div>
    </div>
    <div class="gbar"><i style="width:${pct}%;background:${G.color}"></i></div>
    ${finished ? `<div class="celebrate"><h2>Цель закрыта! 🎉</h2><p>${G.reward ? 'Ты обещал себе: <b>' + escapeHtml(G.reward) + '</b>. Забирай.' : 'Ты дошёл. Гордись.'}</p></div>` : ''}
    <div class="gt-grid" style="grid-template-columns:repeat(${cols},1fr)">${cells.join('')}</div>
    <div class="actions">
      <button class="primary" id="share">Поделиться</button>
      <a class="btn secondary" href="/goals">Новая цель</a>
    </div>
    <button class="btn secondary" id="join" style="margin-top:10px">🔥 Начать эту цель у себя →</button>
    <details class="screen">
      <summary>📲 Поставить цель на экран айфона</summary>
      <div class="screen-body">
        <p>Цель станет живыми обоями и будет обновляться каждый день сама — трекер прямо на локскрине.</p>
        ${SHORTCUT
          ? `<a class="btn primary" href="${SHORTCUT}">Добавить ярлык Vita</a>`
          : `<span class="btn disabled">Ярлык готовится — скоро</span>`}
        <a class="btn secondary" href="/gw/${CODE}.png" target="_blank">Открыть картинку цели</a>
        <p>В ярлыке вставь свою ссылку: <b class="mono">${location.origin}/gw/${CODE}.png</b></p>
      </div>
    </details>
    <p class="page-foot" style="text-align:center">Отмечай каждый день, не разрывай цепочку</p>`;

  app.querySelector('.gt-grid').addEventListener('click', e => {
    const c = e.target.closest('.gt-cell');
    if (!c || c.disabled) return;
    toggle(c.dataset.key);
  });
  document.getElementById('share').addEventListener('click', shareLink);
  document.getElementById('join').addEventListener('click', join);
}

async function join() {
  const btn = document.getElementById('join');
  btn.disabled = true; btn.textContent = 'Создаю…';
  try {
    const r = await fetch(`/api/goal/${CODE}/join`, { method: 'POST' });
    const j = await r.json();
    if (r.ok) { location.href = j.url; return; }
  } catch {}
  btn.disabled = false; btn.textContent = '🔥 Начать эту цель у себя →';
}

async function shareLink() {
  const url = location.origin + `/c/${CODE}`;  // публичный read-only вид, чужой не тронет твои дни
  const btn = document.getElementById('share');
  try {
    if (navigator.share) { await navigator.share({ title: G.title, url }); return; }
    await navigator.clipboard.writeText(url);
  } catch {
    const ta = document.createElement('textarea'); ta.value = url; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  }
  btn.textContent = '✓ скопировано'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Поделиться'; btn.classList.remove('copied'); }, 1600);
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

(async () => {
  try {
    const r = await fetch(`/api/goal/${CODE}`);
    if (!r.ok) { app.innerHTML = '<p class="err">Цель не найдена</p>'; return; }
    G = await r.json();
    done = new Set(G.done);
    render();
  } catch {
    app.innerHTML = '<p class="err">Нет связи с сервером — обнови страницу</p>';
  }
})();
</script>
</body>
</html>

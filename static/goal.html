<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <link rel="apple-touch-icon" href="/static/img/apple-touch.png">
<title>Vita — цель</title>
<script src="/static/theme.js?v=2"></script>
<link rel="stylesheet" href="/static/style.css?v=22">
</head>
<body>
<header>
  <a class="logo" href="/">⠿ vita</a>
  <nav class="nav">
    <a href="/">Обои</a>
    <a href="/goals" class="on">Цели</a>
    <a href="/feed">Лента</a>
    <a href="/focus">Фокус</a>
  </nav>
</header>

<main id="app"><p class="page-foot">Загружаю цель…</p></main>

<script>
const CODE = "{{CODE}}";
const SHORTCUT = "{{SHORTCUT_URL}}";
const app = document.getElementById('app');
let G = null, done = new Set(), lastPct = 0;

// ?demo — луп для съёмки рилса: дни проживаются сами, в базу ничего не пишется
const DEMO = new URLSearchParams(location.search).has('demo');
if (DEMO) document.body.classList.add('demo-goal');

const parseLocal = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const isoLocal = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const today = () => { const t = new Date(); t.setHours(0,0,0,0); return t; };

function bestStreak() {
  const start = parseLocal(G.start);
  let best = 0, run = 0;
  for (let i = 0; i < G.days; i++) {
    if (done.has(isoLocal(addDays(start, i)))) { run++; best = Math.max(best, run); } else run = 0;
  }
  return best;
}
function currentStreak() {
  const t = today();
  let cur = done.has(isoLocal(t)) ? t : addDays(t, -1);
  let n = 0;
  while (done.has(isoLocal(cur))) { n++; cur = addDays(cur, -1); }
  return n;
}

async function toggle(key) {
  try {
    const r = await fetch(`/api/goal/${CODE}/toggle`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ day: key })
    });
    if (!r.ok) return;
    const j = await r.json();
    if (j.done) done.add(key); else done.delete(key);
    render(j.done ? { pop: key } : null); // поп только на закрашивании, не на снятии
  } catch {}
}

function render(anim) {
  // в демо время «уже прошло» — ни одна точка не заблокирована как будущая
  const start = parseLocal(G.start), t = DEMO ? addDays(start, G.days) : today();
  const doneCount = done.size;
  const pct = Math.round(doneCount / G.days * 100);
  const finished = doneCount >= G.days;
  const cols = G.days <= 42 ? 6 : G.days <= 120 ? 10 : 14;
  const streak = DEMO ? doneCount : currentStreak();
  const best = DEMO ? doneCount : bestStreak();

  const cells = [];
  let di = 0; // порядковый среди закрашенных — для каскадной задержки при загрузке
  for (let i = 0; i < G.days; i++) {
    const d = addDays(start, i), key = isoLocal(d);
    const isDone = done.has(key);
    const isFuture = d > t;
    const isToday = key === isoLocal(t);
    const bg = isDone ? G.color : 'rgba(255,255,255,.09)';
    const ring = isToday && !isDone ? `box-shadow:inset 0 0 0 2px ${G.color};` : '';
    let cls = 'gt-cell', extra = '';
    if (isDone && anim === 'in') { cls += ' gt-in'; extra = ` style="--d:${Math.min(di * 24, 850)}ms"`; di++; }
    else if (isDone && anim && anim.pop === key) { cls += ' gt-pop'; }
    if (isToday && !isDone) cls += ' gt-today'; // сегодняшнее кольцо мягко дышит
    cells.push(
      `<button class="${cls}" data-shape="${G.shape}" ${isFuture ? 'disabled' : ''} data-key="${key}"${extra} title="День ${i+1} · ${key}">` +
      `<span class="gt-dot" style="background:${bg};${ring}"></span></button>`
    );
  }

  app.innerHTML = `
    <div class="field" style="gap:4px">
      <span class="goal-title" style="text-transform:none">${escapeHtml(G.title)}</span>
      <span class="goal-reward">${G.reward ? '🎁 Награда за цель: <b>' + escapeHtml(G.reward) + '</b>' : ''}</span>
      ${G.peers >= 2 ? `<span style="color:#ff9f45;font-size:13px;font-weight:600;text-transform:none">🔥 ${G.peers} уже с этой целью</span>` : ''}
    </div>
    <div class="stats">
      <div><b>${doneCount}<span class="stat-dim">/${G.days}</span></b><span>выполнено</span></div>
      <div><b class="${anim && anim.pop ? 'stat-pop' : ''}">${streak}🔥</b><span>стрик</span></div>
      <div><b>${best}</b><span>рекорд</span></div>
    </div>
    <div class="gbar"><i style="width:${lastPct}%;background:${G.color}"></i></div>
    ${finished ? `<div class="celebrate"><h2>Цель закрыта! 🎉</h2><p>${G.reward ? 'Ты обещал себе: <b>' + escapeHtml(G.reward) + '</b>. Забирай.' : 'Ты дошёл. Гордись.'}</p></div>` : ''}
    <div class="gt-grid" style="grid-template-columns:repeat(${cols},1fr)">${cells.join('')}</div>
    <div class="actions">
      <button class="primary" id="share">Поделиться</button>
      <a class="btn secondary" href="/goals">Новая цель</a>
    </div>
    <button class="btn secondary" id="join" style="margin-top:10px">🔥 Начать эту цель у себя →</button>
    <details class="screen">
      <summary>📲 Поставить цель на экран айфона</summary>
      <div class="screen-body">
        <p>Цель станет живыми обоями и будет обновляться каждый день сама — трекер прямо на локскрине.</p>
        ${SHORTCUT
          ? `<a class="btn primary" href="${SHORTCUT}">Добавить ярлык Vita</a>`
          : `<span class="btn disabled">Ярлык готовится — скоро</span>`}
        <a class="btn secondary" href="/gw/${CODE}.png" target="_blank">Открыть картинку цели</a>
        <p>В ярлыке вставь свою ссылку: <b class="mono">${location.origin}/gw/${CODE}.png</b></p>
      </div>
    </details>
    <p class="page-foot" style="text-align:center">Отмечай каждый день, не разрывай цепочку</p>`;

  // прогресс-бар плавно доезжает до нового значения (иначе innerHTML сбрасывает transition)
  const bar = app.querySelector('.gbar > i');
  requestAnimationFrame(() => requestAnimationFrame(() => { bar.style.width = pct + '%'; }));
  lastPct = pct;

  if (anim && anim.pop) {
    const grid = app.querySelector('.gt-grid');
    const cell = grid.querySelector(`[data-key="${anim.pop}"]`);
    if (cell) {
      burst(cell, G.color);
      wave(grid, [...grid.children].indexOf(cell), cols);
    }
    if (finished) confetti(G.color);
  }

  app.querySelector('.gt-grid').addEventListener('click', e => {
    const c = e.target.closest('.gt-cell');
    if (!c || c.disabled) return;
    toggle(c.dataset.key);
  });
  document.getElementById('share').addEventListener('click', shareLink);
  document.getElementById('join').addEventListener('click', join);
}

// брызги из тапнутой точки
function burst(cell, color) {
  const b = document.createElement('span');
  b.className = 'gt-burst';
  for (let i = 0; i < 9; i++) {
    const p = document.createElement('i');
    const a = Math.random() * Math.PI * 2, r = 26 + Math.random() * 30;
    p.style.setProperty('--tx', Math.cos(a) * r + 'px');
    p.style.setProperty('--ty', Math.sin(a) * r + 'px');
    p.style.setProperty('--sz', 3 + Math.random() * 4 + 'px');
    p.style.setProperty('--pc', Math.random() < 0.75 ? color : '#fff');
    b.appendChild(p);
  }
  cell.appendChild(b);
  setTimeout(() => b.remove(), 700);
}

// соседние точки подпрыгивают волной от места тапа
function wave(grid, idx, cols) {
  const cells = grid.children;
  const r0 = Math.floor(idx / cols), c0 = idx % cols;
  for (let i = 0; i < cells.length; i++) {
    if (i === idx) continue;
    const dist = Math.hypot(Math.floor(i / cols) - r0, (i % cols) - c0);
    if (dist > 3.2) continue;
    const el = cells[i];
    el.style.setProperty('--wd', Math.round(dist * 55) + 'ms');
    el.classList.add('gt-wave');
    setTimeout(() => el.classList.remove('gt-wave'), 750 + dist * 55);
  }
}

// конфетти на закрытии цели
function confetti(color) {
  if (document.querySelector('.confetti')) return;
  const c = document.createElement('div');
  c.className = 'confetti';
  const colors = [color, '#fff', '#ffd60a', color];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('i');
    p.style.setProperty('--x', Math.random() * 100 + 'vw');
    p.style.setProperty('--pc', colors[Math.floor(Math.random() * colors.length)]);
    p.style.setProperty('--r', Math.random() * 360 + 'deg');
    p.style.setProperty('--t', 1.6 + Math.random() * 1.4 + 's');
    p.style.setProperty('--cd', Math.random() * 0.5 + 's');
    c.appendChild(p);
  }
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 3600);
}

// демо-луп: сетка пустеет → дни проживаются один за другим → конфетти → заново
async function demoLoop() {
  const start = parseLocal(G.start);
  const keys = [];
  for (let i = 0; i < G.days; i++) keys.push(isoLocal(addDays(start, i)));
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const stepMs = Math.max(90, Math.min(220, Math.round(5200 / G.days)));
  for (;;) {
    done = new Set(); lastPct = 0; render();
    await sleep(1000);
    for (const k of keys) { done.add(k); render({ pop: k }); await sleep(stepMs); }
    await sleep(3400); // celebrate + конфетти в кадре
  }
}

async function join() {
  const btn = document.getElementById('join');
  btn.disabled = true; btn.textContent = 'Создаю…';
  try {
    const r = await fetch(`/api/goal/${CODE}/join`, { method: 'POST' });
    const j = await r.json();
    if (r.ok) { location.href = j.url; return; }
  } catch {}
  btn.disabled = false; btn.textContent = '🔥 Начать эту цель у себя →';
}

async function shareLink() {
  const url = location.origin + `/c/${CODE}`;  // публичный read-only вид, чужой не тронет твои дни
  const btn = document.getElementById('share');
  try {
    if (navigator.share) { await navigator.share({ title: G.title, url }); return; }
    await navigator.clipboard.writeText(url);
  } catch {
    const ta = document.createElement('textarea'); ta.value = url; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  }
  btn.textContent = '✓ скопировано'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Поделиться'; btn.classList.remove('copied'); }, 1600);
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

(async () => {
  try {
    const r = await fetch(`/api/goal/${CODE}`);
    if (!r.ok) { app.innerHTML = '<p class="err">Цель не найдена</p>'; return; }
    G = await r.json();
    done = new Set(G.done);
    if (DEMO) { demoLoop(); return; }
    render('in');
  } catch {
    app.innerHTML = '<p class="err">Нет связи с сервером — обнови страницу</p>';
  }
})();
</script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vita — твоя жизнь в точках</title>
<link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
<header>
  <span class="logo">⠿ vita</span>
  <span class="tag">твоя жизнь в точках</span>
</header>

<main>
  <div class="seg wide" id="mode">
    <button data-v="month" class="on">Месяц</button>
    <button data-v="year">Год</button>
    <button data-v="life">Жизнь</button>
    <button data-v="goal">Цель</button>
  </div>

  <div class="phone"><canvas id="cv" width="1179" height="2556"></canvas></div>

  <div class="mini" id="mini" title="К превью">
    <canvas id="cv2" width="1179" height="2556"></canvas>
  </div>

  <div class="stats">
    <div><b id="stat1">0</b><span id="stat1l">дней позади</span></div>
    <div><b id="stat2">0</b><span id="stat2l">впереди</span></div>
  </div>

  <section class="controls">
    <label class="field">Заголовок
      <input id="title" maxlength="24" value="ТВОЙ МЕСЯЦ" autocomplete="off"
        placeholder="пусто — обои без заголовка">
    </label>

    <label class="field" id="birthRow" hidden>Дата рождения
      <input type="date" id="birth" value="2000-01-01">
    </label>

    <div class="field two" id="goalRow" hidden>
      <label>Старт
        <input type="date" id="goalStart">
      </label>
      <label>Цель
        <input type="date" id="goalEnd">
      </label>
    </div>

    <div class="field">Цвет
      <div class="swatches" id="colors"></div>
    </div>

    <div class="field">Фон
      <div class="seg" id="bg">
        <button data-v="black" class="on">Чёрный</button>
        <button data-v="white">Белый</button>
        <button data-v="navy">Синий</button>
      </div>
    </div>

    <div class="field">Точки
      <div class="seg" id="shape">
        <button data-v="circle" class="on">Круг</button>
        <button data-v="square">Квадрат</button>
        <button data-v="rounded">Мягкие</button>
      </div>
    </div>

    <div class="field">Цифры внизу
      <div class="seg" id="footer">
        <button data-v="1" class="on">Да</button>
        <button data-v="0">Нет</button>
      </div>
    </div>

    <button class="primary" id="getBtn">Получить автообои</button>
    <button class="secondary" id="dl">Скачать картинку бесплатно</button>
  </section>
</main>

<div class="modal-back" id="modal" hidden>
  <div class="modal">
    <button class="modal-x" id="modalClose">✕</button>
    <h2>Живые обои Vita</h2>
    <p class="sub">Каждую ночь точка закрашивается сама. Первым 100 —
      неделя бесплатно за идею.</p>

    <label class="field">Твоя идея — что добавить в Vita?
      <textarea id="idea" rows="3" maxlength="500"
        placeholder="Например: режим «до дня рождения» или точки-сердечки"></textarea>
    </label>
    <label class="field">Телега или инста — туда придёт вторая неделя
      <input id="contact" maxlength="64" placeholder="@nickname" autocomplete="off">
    </label>
    <button class="primary" id="ideaSend">Получить неделю бесплатно</button>
    <p class="err" id="ideaErr" hidden></p>

    <div class="or">или сразу оплатить</div>
    <div class="tariffs">
      <button class="tariff" disabled><b>119 ₽</b><span>месяц</span></button>
      <button class="tariff" disabled><b>269 ₽</b><span>3 месяца</span></button>
      <button class="tariff" disabled><b>590 ₽</b><span>год</span></button>
    </div>
    <p class="hint">Оплата по СБП подключается — пока неделя за идею.</p>
  </div>
</div>

<footer class="page-foot">от 49 ₽/мес · без автосписаний</footer>

<script src="/static/app.js?v=3"></script>
</body>
</html>

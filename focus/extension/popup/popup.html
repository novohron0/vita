<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="viewMain">
    <header class="top">
      <div class="brand">Vita Focus <span id="ver" class="ver"></span></div>
      <button type="button" id="openSettings" class="icon-btn" title="Настройки">⚙</button>
    </header>

    <button type="button" id="sitePick" class="site-pick">
      <span id="siteGlyph" class="site-glyph">▶</span>
      <span class="site-pick-text">
        <span id="siteName">YouTube</span>
        <span id="siteCnt" class="muted">0 из 0</span>
      </span>
      <span class="chev">›</span>
    </button>

    <div id="rows" class="rows"></div>

    <details id="ytExtras" class="extras" hidden>
      <summary>Фильтры слов и каналов</summary>
      <input id="kwIn" type="text" placeholder="Слова: mrbeast, обзор…" spellcheck="false">
      <input id="chIn" type="text" placeholder="Каналы: имя автора…" spellcheck="false">
    </details>
  </div>

  <div id="siteSheet" class="sheet-wrap" hidden>
    <div class="sheet-backdrop"></div>
    <div class="sheet">
      <div class="sheet-head">
        <span>Сайты</span>
        <button type="button" id="closeSheet" class="icon-btn sm">✕</button>
      </div>
      <input id="siteSearch" type="search" placeholder="Поиск…" spellcheck="false" autocomplete="off">
      <div id="siteList" class="site-list"></div>
    </div>
  </div>

  <div id="viewSettings" hidden>
    <header class="top">
      <button type="button" id="closeSettings" class="back-btn">← Назад</button>
      <span class="brand sm">Настройки</span>
    </header>

    <section class="block">
      <div class="block-h">Профили</div>
      <nav id="presets" class="presets"></nav>
    </section>

    <section class="block">
      <div class="block-h">Расписание <span id="schedState" class="muted">выкл</span></div>
      <label class="chk"><input type="checkbox" id="schedOn"> Блоки только в рабочие часы</label>
      <div class="sched-times">
        <label>с <input type="number" id="schedStart" min="0" max="23" value="9"></label>
        <label>до <input type="number" id="schedEnd" min="0" max="23" value="22"></label>
      </div>
      <label class="chk"><input type="checkbox" id="cooldownOn"> Задержка 12ч перед выключением</label>
      <p id="pendingMsg" class="msg ok" hidden></p>
      <span id="schedBadge" class="pill" hidden></span>
    </section>

    <section class="block">
      <div class="block-h">PIN <span id="pinState" class="muted">выкл</span></div>
      <input id="pinIn" type="password" inputmode="numeric" maxlength="8" placeholder="4–8 цифр" autocomplete="off">
      <div class="btn-row">
        <button type="button" id="pinSave">Установить</button>
        <button type="button" id="pinOff" class="ghost">Снять</button>
      </div>
      <p id="pinMsg" class="msg err" hidden></p>
    </section>

    <section class="block">
      <div class="btn-row">
        <button type="button" id="exportBtn" class="ghost wide">Экспорт</button>
        <button type="button" id="importBtn" class="ghost wide">Импорт</button>
      </div>
    </section>

    <footer class="foot"><a href="https://vitadots.ru/focus" target="_blank" rel="noopener">vitadots.ru/focus</a></footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>

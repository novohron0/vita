<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="viewMain">
    <header class="top">
      <div class="brand">Vita Focus</div>
      <button type="button" id="openSettings" class="gear" title="Настройки">⚙</button>
    </header>

    <nav class="tabs" id="tabs"><span class="tab-ind" id="tabInd"></span></nav>

    <div id="rows" class="list"></div>
  </div>

  <div id="siteSheet" class="overlay" hidden>
    <div class="overlay-bg"></div>
    <div class="sheet">
      <div class="sheet-head"><span>Сайты</span><button type="button" id="closeSheet" class="icon-btn sm">✕</button></div>
      <input id="siteSearch" type="search" placeholder="Поиск…" spellcheck="false" autocomplete="off">
      <div id="siteList" class="site-list"></div>
    </div>
  </div>

  <div id="viewSettings" hidden>
    <header class="top">
      <button type="button" id="closeSettings" class="back-btn">← Назад</button>
      <span class="brand sm">Настройки</span>
    </header>

    <section class="block">
      <div class="block-h">Быстрые профили</div>
      <nav id="presets" class="presets"></nav>
    </section>

    <section class="block">
      <div class="block-h">Защита паролем <span id="pinState" class="muted">выкл</span></div>
      <input id="pinIn" type="password" inputmode="numeric" maxlength="8" placeholder="4–8 цифр" autocomplete="off">
      <div class="btn-row">
        <button type="button" id="pinSave">Установить</button>
        <button type="button" id="pinOff" class="ghost">Снять</button>
      </div>
      <p id="pinMsg" class="msg err" hidden></p>
    </section>

    <section class="block">
      <div class="block-h">Расписание <span id="schedState" class="muted">выкл</span></div>
      <label class="chk"><input type="checkbox" id="schedOn"> Блоки только в рабочие часы</label>
      <div class="sched-times">
        <label>с <input type="number" id="schedStart" min="0" max="23" value="9"></label>
        <label>до <input type="number" id="schedEnd" min="0" max="23" value="22"></label>
      </div>
      <label class="chk"><input type="checkbox" id="cooldownOn"> Задержка 12ч перед выключением</label>
      <p id="pendingMsg" class="msg ok" hidden></p>
      <span id="schedBadge" class="pill" hidden></span>
    </section>

    <section class="block">
      <div class="block-h">Импорт / экспорт</div>
      <div class="btn-row">
        <button type="button" id="exportBtn" class="ghost wide">Экспорт</button>
        <button type="button" id="importBtn" class="ghost wide">Импорт</button>
      </div>
    </section>

    <footer class="foot"><span id="ver" class="ver"></span> · <a href="https://vitadots.ru/focus" target="_blank" rel="noopener">vitadots.ru/focus</a></footer>
  </div>

  <div id="pinSheet" class="overlay" hidden>
    <div class="overlay-bg"></div>
    <div class="sheet pin-sheet">
      <div class="sheet-head"><span id="pinTitle">Пароль</span></div>
      <input id="pinPrompt" type="password" inputmode="numeric" maxlength="8" autocomplete="off" placeholder="••••">
      <div class="btn-row">
        <button type="button" id="pinCancel" class="ghost">Отмена</button>
        <button type="button" id="pinOk">OK</button>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>

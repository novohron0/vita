<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <b>⠿ vita focus</b>
    <span id="schedBadge" class="badge-off" hidden></span>
    <span id="score">0</span>
  </header>
  <nav id="tabs"></nav>
  <div id="rows"></div>
  <section id="schedBox" class="pin">
    <div class="pin-head"><b>Расписание</b><span id="schedState">выкл</span></div>
    <label class="sched-row"><input type="checkbox" id="schedOn"> Блоки только в эти часы</label>
    <div class="sched-times">
      <label>с <input type="number" id="schedStart" min="0" max="23" value="9"></label>
      <label>до <input type="number" id="schedEnd" min="0" max="23" value="22"></label>
    </div>
    <label class="sched-row"><input type="checkbox" id="cooldownOn"> Задержка 12ч перед выключением</label>
    <p id="pendingMsg" class="pin-msg" hidden></p>
  </section>
  <section id="pinBox" class="pin">
    <div class="pin-head"><b>Защита PIN</b><span id="pinState">выкл</span></div>
    <input id="pinIn" type="password" inputmode="numeric" maxlength="8" placeholder="4–8 цифр" autocomplete="off">
    <div class="pin-actions">
      <button type="button" id="pinSave">Установить</button>
      <button type="button" id="pinOff" class="ghost">Снять</button>
    </div>
    <p id="pinMsg" class="pin-msg" hidden></p>
  </section>
  <footer>
    <div class="io-row">
      <button type="button" id="exportBtn" class="ghost-btn">Экспорт</button>
      <button type="button" id="importBtn" class="ghost-btn">Импорт</button>
    </div>
    <a href="https://vitadots.ru/focus" target="_blank" rel="noopener">vitadots.ru/focus</a>
  </footer>
  <script type="module" src="popup.js"></script>
</body>
</html>

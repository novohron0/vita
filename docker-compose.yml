services:
  vita:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # полночь = новая точка; часовой пояс критичен
      TZ: ${TZ:-Europe/Moscow}
    ports:
      # слушаем только докер-мост: c интернета не достать, а Caddy из соседнего
      # ~/yoy ходит сюда как host.docker.internal:8788
      - "172.17.0.1:8788:8787"
    volumes:
      # база ссылок и идей переживает пересборки
      - ./data:/app/data

  # DNS-фильтр «Сетевой блокировки» Vita Focus. Наружу торчит только
  # /dns-query через Caddy (~/yoy); админка и API — только с хоста.
  adguard:
    image: adguard/adguardhome:latest
    restart: unless-stopped
    ports:
      - "172.17.0.1:8083:80"
    volumes:
      - ./data/adguard/work:/opt/adguardhome/work
      - ./data/adguard/conf:/opt/adguardhome/conf
